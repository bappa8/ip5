<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Internet Speed Test</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex; justify-content: center; align-items: center;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }
  .container {
    text-align: center;
    padding: 40px;
    width: 90%; max-width: 600px;
  }
  h1 {
    font-size: 1.5rem; margin-bottom: 25px;
    color: #1565c0;
  }
  .ip-info {
    padding: 15px; margin-bottom: 20px; font-size: 1.05rem;
  }
  .ip-row {
    display: flex; justify-content: space-between; padding: 8px 0;
    border-bottom: 1px solid rgba(0, 0, 0, 0.1);
  }
  .ip-row:last-child { border-bottom: none; }
  .ip-label { font-size: 1.1rem; font-weight: bold; }
  /* Colorful labels */
  .ip-row:nth-child(1) .ip-label { color: #cc5500; }  /* IP Address - deep orange (match value) */
  .ip-row:nth-child(2) .ip-label { color: #008000; }  /* Country - green (match value) */
  .ip-row:nth-child(3) .ip-label { color: #8e24aa; }  /* City - purple (match value) */
  .ip-row:nth-child(4) .ip-label { color: #00838f; }  /* ISP - teal (match value) */
  .ip-value {
    font-weight: bold; text-align: right;
    max-width: 60%; word-break: break-all;
  }
  /* Distinct colors per field value */
  #ipAddress { color: #cc5500; font-weight: 900; }   /* IP Address - deep orange, extra bold */
  #country   { color: #008000; }   /* Country - green */
  #city      { color: #8e24aa; }   /* City - purple */
  #isp       { color: #00838f; }   /* ISP - teal */
  .speed-display {
    margin: 20px 0; padding: 30px;
  }
  .speed-value {
    font-size: 3rem; font-weight: bold; color: #00a152;
  }
  .speed-unit { font-size: 1.2rem; color: #555; }
  .speed-type { font-size: 1rem; margin-top: 10px; color: #3a7bd5; }
  .results {
    margin-top: 15px; padding: 15px; font-size: 0.9rem;
  }
  .result-item {
    display: flex; justify-content: space-between; padding: 8px 0;
    border-bottom: 1px solid rgba(0, 0, 0, 0.1);
  }
  .result-item:last-child { border-bottom: none; }
  .result-label { color: #333; font-weight: bold; }
  .result-item:nth-child(1) .result-label,
  #pingResult     { color: #00897b; }  /* Ping - teal */
  .result-item:nth-child(2) .result-label,
  #downloadResult { color: #1565c0; }  /* Download - blue */
  .result-item:nth-child(3) .result-label,
  #uploadResult   { color: #6a1b9a; }  /* Upload - purple */
  .result-value { font-weight: bold; }
  .btn {
    margin: 10px 5px; padding: 12px 24px; border: 2px solid currentColor;
    border-radius: 8px; background: transparent;
    font-size: 1rem; font-weight: bold; cursor: pointer; transition: all 0.3s ease;
  }
  .btn-download { color: #1565c0; }
  .btn-upload { color: #e65100; }
  .btn-both { color: #00a152; }
  .btn:hover { transform: translateY(-2px); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .status { margin-top: 20px; font-size: 0.9rem; color: #555; }
  .loader {
    display: none; width: 40px; height: 40px;
    border: 4px solid rgba(0, 0, 0, 0.15); border-top-color: #00a152;
    border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Speed meters */
  .meters {
    display: flex; justify-content: center; align-items: flex-start;
    gap: 18px; flex-wrap: nowrap; margin: 25px 0;
  }
  .meter {
    position: relative; width: 120px; text-align: center; flex: 0 0 auto;
  }
  .meter svg {
    width: 120px; height: 120px; transform: rotate(-90deg);
  }
  .meter-track {
    fill: none; stroke: rgba(0, 0, 0, 0.1); stroke-width: 9;
  }
  .meter-fill {
    fill: none; stroke-width: 9; stroke-linecap: round;
    stroke-dasharray: 326.7; /* 2 * PI * r (r=52) */
    stroke-dashoffset: 326.7;
    transition: stroke-dashoffset 0.25s ease;
  }
  .meter-fill-dl { stroke: #1565c0; }   /* download - blue */
  .meter-fill-ul { stroke: #6a1b9a; }   /* upload - purple */
  .meter-fill-ping { stroke: #00897b; } /* ping - teal */
  .meter-center {
    position: absolute; top: 0; left: 0;
    width: 120px; height: 120px;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    pointer-events: none;
  }
  .meter-num { font-size: 1.6rem; font-weight: 900; color: #222; line-height: 1; }
  .meter-mbps { font-size: 0.75rem; color: #777; margin-top: 2px; }
  .meter-label { margin-top: 8px; font-weight: bold; font-size: 0.95rem; }
  .meter-label-dl { color: #1565c0; }
  .meter-label-ul { color: #6a1b9a; }
  .meter-label-ping { color: #00897b; }

  .copyright {
    margin-top: 25px; font-size: 0.85rem; font-weight: bold;
    color: #8a0303; /* blood red */
  }
</style>

<body>
<div class="container">
  <h1>Internet Speed Test</h1>

  <div class="ip-info">
    <div class="ip-row"><span class="ip-label">IP Address:</span><span class="ip-value" id="ipAddress">Loading...</span></div>
    <div class="ip-row"><span class="ip-label">Country:</span><span class="ip-value" id="country">Loading...</span></div>
    <div class="ip-row"><span class="ip-label">City:</span><span class="ip-value" id="city">Loading...</span></div>
    <div class="ip-row"><span class="ip-label">ISP:</span><span class="ip-value" id="isp">Loading...</span></div>
  </div>

  <div class="speed-display">
    <div class="speed-value" id="speedValue">0.00</div>
    <div class="speed-unit">Mbps</div>
    <div class="speed-type" id="speedType">Ready to test</div>
  </div>

  <div class="meters">
    <div class="meter">
      <svg viewbox="0 0 120 120">
        <circle class="meter-track" cx="60" cy="60" r="52"></circle>
        <circle class="meter-fill meter-fill-ping" id="pingArc" cx="60" cy="60" r="52"></circle>
      </svg>
      <div class="meter-center">
        <div class="meter-num" id="pingNum">0</div>
        <div class="meter-mbps">ms</div>
      </div>
      <div class="meter-label meter-label-ping">⚡ Ping</div>
    </div>

    <div class="meter">
      <svg viewbox="0 0 120 120">
        <circle class="meter-track" cx="60" cy="60" r="52"></circle>
        <circle class="meter-fill meter-fill-dl" id="dlArc" cx="60" cy="60" r="52"></circle>
      </svg>
      <div class="meter-center">
        <div class="meter-num" id="dlNum">0.0</div>
        <div class="meter-mbps">Mbps</div>
      </div>
      <div class="meter-label meter-label-dl">⬇ Download</div>
    </div>

    <div class="meter">
      <svg viewbox="0 0 120 120">
        <circle class="meter-track" cx="60" cy="60" r="52"></circle>
        <circle class="meter-fill meter-fill-ul" id="ulArc" cx="60" cy="60" r="52"></circle>
      </svg>
      <div class="meter-center">
        <div class="meter-num" id="ulNum">0.0</div>
        <div class="meter-mbps">Mbps</div>
      </div>
      <div class="meter-label meter-label-ul">⬆ Upload</div>
    </div>
  </div>

  <div class="results" id="results" style="display: none;">
    <div class="result-item"><span class="result-label">Ping:</span><span class="result-value" id="pingResult">--</span></div>
    <div class="result-item"><span class="result-label">Download:</span><span class="result-value" id="downloadResult">--</span></div>
    <div class="result-item"><span class="result-label">Upload:</span><span class="result-value" id="uploadResult">--</span></div>
  </div>

  <div class="loader" id="loader"></div>

  <div>
    <button class="btn btn-download" id="btnDownload">Download</button>
    <button class="btn btn-upload" id="btnUpload">Upload</button>
    <button class="btn btn-both" id="btnBoth">Both</button>
  </div>

  <div class="status" id="status">Click a button to start test</div>

  <div class="copyright">&copy; Bappa Ghosh. All rights reserved.</div>
</div>

<script>
  const speedValue   = document.getElementById('speedValue');
  const speedType    = document.getElementById('speedType');
  const status       = document.getElementById('status');
  const loader       = document.getElementById('loader');
  const results      = document.getElementById('results');
  const downloadResult = document.getElementById('downloadResult');
  const uploadResult   = document.getElementById('uploadResult');
  const pingResult     = document.getElementById('pingResult');
  const btnDownload  = document.getElementById('btnDownload');
  const btnUpload    = document.getElementById('btnUpload');
  const btnBoth      = document.getElementById('btnBoth');
  const ipAddressEl  = document.getElementById('ipAddress');
  const countryEl    = document.getElementById('country');
  const cityEl       = document.getElementById('city');
  const ispEl        = document.getElementById('isp');
  const dlArc = document.getElementById('dlArc');
  const ulArc = document.getElementById('ulArc');
  const dlNum = document.getElementById('dlNum');
  const ulNum = document.getElementById('ulNum');
  const pingArc = document.getElementById('pingArc');
  const pingNum = document.getElementById('pingNum');

  // Gauge config: maps a speed (Mbps) onto the circular arc.
  const ARC_LEN = 326.7;     // circumference for r=52
  const METER_MAX = 200;     // Mbps at which the gauge is full
  function setMeter(arcEl, numEl, mbps) {
    const pct = Math.max(0, Math.min(1, mbps / METER_MAX));
    arcEl.style.strokeDashoffset = (ARC_LEN * (1 - pct)).toFixed(1);
    numEl.textContent = mbps.toFixed(1);
  }

  // Ping gauge: lower ms = fuller ring (better latency).
  const PING_MAX = 300;      // ms at which the ring is effectively empty
  function setPingMeter(ms) {
    if (ms > 0) {
      const pct = Math.max(0, Math.min(1, 1 - (ms / PING_MAX)));
      pingArc.style.strokeDashoffset = (ARC_LEN * (1 - pct)).toFixed(1);
      pingNum.textContent = Math.round(ms);
    } else {
      pingArc.style.strokeDashoffset = ARC_LEN.toFixed(1);
      pingNum.textContent = '--';
    }
  }

  function setButtonsDisabled(disabled) {
    btnDownload.disabled = disabled;
    btnUpload.disabled   = disabled;
    btnBoth.disabled     = disabled;
  }

  function updateDisplay(value, type) {
    speedValue.textContent = value.toFixed(2);
    if (type) speedType.textContent = type;
  }

  // JSONP helper — bypasses CORS entirely by loading the API response
  // as a <script>. Works even from file:// and on restrictive networks.
  function jsonp(url, cbParam) {
    return new Promise((resolve, reject) => {
      const cbName = 'jsonp_cb_' + Math.random().toString(36).slice(2);
      const sep = url.includes('?') ? '&' : '?';
      const script = document.createElement('script');
      const timer = setTimeout(() => { cleanup(); reject(new Error('timeout')); }, 8000);
      function cleanup() {
        clearTimeout(timer);
        delete window[cbName];
        if (script.parentNode) script.parentNode.removeChild(script);
      }
      window[cbName] = (data) => { cleanup(); resolve(data); };
      script.onerror = () => { cleanup(); reject(new Error('script error')); };
      script.src = url + sep + cbParam + '=' + cbName;
      document.head.appendChild(script);
    });
  }

  async function fetchIPInfo() {
    // 1) Try JSONP providers first (immune to CORS, work on file://).
    const jsonpProviders = [
      {
        name: 'ip-api.com',
        run: () => jsonp('http://ip-api.com/json/?fields=status,country,city,isp,query', 'callback'),
        parse: d => (d && d.status === 'success') ? {
          ip: d.query, country: d.country, city: d.city, isp: d.isp
        } : null
      },
      {
        name: 'geojs.io',
        run: () => jsonp('https://get.geojs.io/v1/ip/geo.js', 'callback'),
        parse: d => (d && d.ip) ? {
          ip: d.ip, country: d.country, city: d.city,
          isp: d.organization_name || d.organization || '-'
        } : null
      }
    ];

    for (const p of jsonpProviders) {
      try {
        const info = p.parse(await p.run());
        if (info && info.ip) {
          ipAddressEl.textContent = info.ip;
          countryEl.textContent   = info.country || '-';
          cityEl.textContent      = info.city || '-';
          ispEl.textContent       = info.isp || '-';
          return;
        }
      } catch (e) { /* try next */ }
    }

    // 2) Fallback to CORS fetch providers (work when served over http/https).
    const fetchProviders = [
      { url: 'https://ipwho.is/',
        parse: d => (d && d.success) ? { ip: d.ip, country: d.country, city: d.city, isp: d.connection ? d.connection.isp : (d.isp || '-') } : null },
      { url: 'https://ipapi.co/json/',
        parse: d => (d && d.ip && !d.error) ? { ip: d.ip, country: d.country_name, city: d.city, isp: d.org } : null }
    ];

    for (const p of fetchProviders) {
      try {
        const res = await fetch(p.url, { cache: 'no-store' });
        if (!res.ok) continue;
        const info = p.parse(await res.json());
        if (info && info.ip) {
          ipAddressEl.textContent = info.ip;
          countryEl.textContent   = info.country || '-';
          cityEl.textContent      = info.city || '-';
          ispEl.textContent       = info.isp || '-';
          return;
        }
      } catch (e) { /* try next */ }
    }

    // 3) Last resort: at least show the IP via JSONP (ipify supports it).
    try {
      const d = await jsonp('https://api.ipify.org?format=jsonp', 'callback');
      ipAddressEl.textContent = d.ip;
      countryEl.textContent = '-'; cityEl.textContent = '-'; ispEl.textContent = '-';
    } catch (e2) {
      ipAddressEl.textContent = 'Unable to fetch';
      countryEl.textContent   = 'Unable to fetch';
      cityEl.textContent      = 'Unable to fetch';
      ispEl.textContent       = 'Unable to fetch';
    }
  }

  // Latency: time a tiny resource load. Uses Image() / JSONP which are NOT
  // subject to CORS, so this works even on restrictive networks and file://.
  function pingOnce() {
    return new Promise((resolve) => {
      const start = performance.now();
      let done = false;
      const finish = (ok) => {
        if (done) return;
        done = true;
        resolve(ok ? (performance.now() - start) : null);
      };
      // A small, cache-busted image from a fast CDN. onload OR onerror both
      // mean the round-trip completed (we don't care about the content).
      const img = new Image();
      const timer = setTimeout(() => finish(false), 5000);
      img.onload = img.onerror = () => { clearTimeout(timer); finish(true); };
      img.src = 'https://www.cloudflare.com/favicon.ico?cb=' + Date.now() + Math.random();
    });
  }

  async function measurePing() {
    const iterations = 5;
    let total = 0, success = 0;
    // One warm-up request (DNS/TLS) that we don't count, for a fairer number.
    await pingOnce();
    for (let i = 0; i < iterations; i++) {
      const t = await pingOnce();
      if (t !== null) { total += t; success++; }
    }
    return success > 0 ? total / success : 0;
  }

  // Download: measures ACTUAL bytes received via streaming, with live updates.
  async function testDownload() {
    status.textContent = 'Testing download speed...';
    speedType.textContent = 'Download';

    // Cloudflare speed endpoint serves arbitrary-sized payloads with proper CORS.
    const bytesToFetch = 25 * 1024 * 1024; // 25 MB
    const url = 'https://speed.cloudflare.com/__down?bytes=' + bytesToFetch + '&t=' + Date.now();

    const startTime = performance.now();
    let received = 0;
    try {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 30000);
      const response = await fetch(url, { cache: 'no-store', signal: controller.signal });
      if (!response.body) {
        // Fallback for browsers without streaming: read whole blob.
        const blob = await response.blob();
        received = blob.size;
      } else {
        const reader = response.body.getReader();
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          received += value.length;
          const elapsed = (performance.now() - startTime) / 1000;
          if (elapsed > 0) {
            const mbps = (received * 8) / elapsed / 1e6;
            updateDisplay(mbps, 'Download Speed');
            setMeter(dlArc, dlNum, mbps);
          }
        }
      }
      clearTimeout(timeoutId);
    } catch (e) {
      // continue with whatever we received before the error/timeout
    }

    const duration = (performance.now() - startTime) / 1000;
    if (duration > 0.2 && received > 0) {
      const speedMbps = (received * 8) / duration / 1e6;
      updateDisplay(speedMbps, 'Download Speed');
      setMeter(dlArc, dlNum, speedMbps);
      downloadResult.textContent = speedMbps.toFixed(2) + ' Mbps';
      return speedMbps;
    }
    status.textContent = 'Download test failed. Try again.';
    downloadResult.textContent = 'failed';
    return 0;
  }

  // Upload: repeatedly POSTs random chunks for ~20s and measures throughput,
  // with live meter updates (mirrors the sustained download test).
  async function testUpload() {
    status.textContent = 'Testing upload speed...';
    speedType.textContent = 'Upload';

    const TEST_MS = 20000;          // run for ~20 seconds
    const chunkSize = 2 * 1024 * 1024; // 2 MB per request
    const data = new Uint8Array(chunkSize);
    for (let off = 0; off < chunkSize; off += 65536) {
      crypto.getRandomValues(data.subarray(off, Math.min(off + 65536, chunkSize)));
    }

    let totalBytes = 0;
    const startTime = performance.now();
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), TEST_MS + 5000);

    try {
      while (performance.now() - startTime < TEST_MS) {
        await fetch('https://speed.cloudflare.com/__up', {
          method: 'POST',
          body: data,
          cache: 'no-store',
          signal: controller.signal
        });
        totalBytes += chunkSize;
        const elapsed = (performance.now() - startTime) / 1000;
        if (elapsed > 0) {
          const mbps = (totalBytes * 8) / elapsed / 1e6;
          updateDisplay(mbps, 'Upload Speed');
          setMeter(ulArc, ulNum, mbps);
          status.textContent = 'Uploading... ' + Math.round(elapsed) + 's';
        }
      }
      clearTimeout(timeoutId);
    } catch (e) {
      clearTimeout(timeoutId);
      // keep whatever we managed to upload before an abort/error
    }

    const duration = (performance.now() - startTime) / 1000;
    if (duration > 0.2 && totalBytes > 0) {
      const speedMbps = (totalBytes * 8) / duration / 1e6;
      updateDisplay(speedMbps, 'Upload Speed');
      setMeter(ulArc, ulNum, speedMbps);
      uploadResult.textContent = speedMbps.toFixed(2) + ' Mbps';
      return speedMbps;
    }
    status.textContent = 'Upload test failed. Try again.';
    uploadResult.textContent = 'failed';
    return 0;
  }

  async function testSpeed(type) {
    setButtonsDisabled(true);
    loader.style.display = 'block';
    status.textContent = 'Starting test...';
    speedValue.textContent = '...';
    setMeter(dlArc, dlNum, 0); setMeter(ulArc, ulNum, 0); setPingMeter(0);
    results.style.display = 'none';
    try {
      const ping = await measurePing();
      pingResult.textContent = ping > 0 ? Math.round(ping) + ' ms' : 'n/a';
      setPingMeter(ping);
      if (type === 'download') await testDownload();
      else await testUpload();
      results.style.display = 'block';
      if (!/failed/.test(status.textContent)) status.textContent = 'Test completed!';
    } catch (error) {
      status.textContent = 'Error: ' + error.message;
    }
    loader.style.display = 'none';
    setButtonsDisabled(false);
  }

  async function testBoth() {
    setButtonsDisabled(true);
    loader.style.display = 'block';
    status.textContent = 'Starting full test...';
    speedValue.textContent = '...';
    setMeter(dlArc, dlNum, 0); setMeter(ulArc, ulNum, 0); setPingMeter(0);
    results.style.display = 'none';
    try {
      status.textContent = 'Measuring ping...';
      const ping = await measurePing();
      pingResult.textContent = ping > 0 ? Math.round(ping) + ' ms' : 'n/a';
      setPingMeter(ping);
      await testDownload();
      await testUpload();
      results.style.display = 'block';
      status.textContent = 'Full test completed!';
    } catch (error) {
      status.textContent = 'Error: ' + error.message;
    }
    loader.style.display = 'none';
    setButtonsDisabled(false);
  }

  // Event listeners (replaces inline onclick attributes).
  btnDownload.addEventListener('click', () => testSpeed('download'));
  btnUpload.addEventListener('click', () => testSpeed('upload'));
  btnBoth.addEventListener('click', testBoth);

  fetchIPInfo();
</script>
